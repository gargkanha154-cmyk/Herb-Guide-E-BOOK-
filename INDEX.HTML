<!DOCTYPE html>
<html>
<head>
    <title>🌿 Herb Directory</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:Arial;background:linear-gradient(135deg,#667eea,#764ba2);color:white;min-height:100vh;}
        header{text-align:center;padding:3rem 1rem;background:rgba(255,255,255,0.1);}
        .logo{width:120px;height:120px;border-radius:50%;margin-bottom:1rem;box-shadow:0 10px 30px rgba(0,0,0,0.3);}
        h1{font-size:2.5rem;text-shadow:2px 2px 4px rgba(0,0,0,0.5);}
        .herbs-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:2rem;max-width:1000px;margin:2rem auto;padding:2rem;}
        .herb-card{background:white;color:#333;padding:2rem;border-radius:20px;text-decoration:none;text-align:center;font-size:1.5rem;transition:all 0.3s;box-shadow:0 10px 30px rgba(0,0,0,0.2);}
        .herb-card:hover{transform:translateY(-10px);box-shadow:0 20px 40px rgba(0,0,0,0.3);}
    </style>
</head>
<body>
    <header>
        <img src="images/logo.png" alt="Logo" class="logo">
        <h1>🌿 Herb Directory</h1>
    </header>
    
    <div class="herbs-grid">
        <a href="herbs/basil.html" class="herb-card">🌱 Basil</a>
        <a href="herbs/mint.html" class="herb-card">🌿 Mint</a>
        <a href="herbs/rosemary.html" class="herb-card">🌲 Rosemary</a>
    </div>
</body>
</html>
